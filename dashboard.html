<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DTB Technologies</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="./dist/output.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/mobile-optimizations.css">
    <style>
        .fade-in { opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
        .feature-card { transition: border-color 0.2s ease; }
        .feature-card:hover { border-color: rgba(59,130,246,0.3); }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex flex-col">

    <!-- Minimal top bar -->
    <header class="w-full py-4 px-6">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-2 text-slate-400 hover:text-white transition-colors text-sm">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Home</span>
            </a>
            <div class="flex items-center space-x-2">
                <img src="./assets/dtb-logo.png" alt="DTB Technologies" class="h-8 w-8 rounded-lg object-cover">
                <span class="text-white font-semibold text-sm hidden sm:block">DTB Technologies</span>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main class="flex-1 flex items-center justify-center px-4 py-8 sm:py-12">
        <div class="w-full max-w-lg">
            <!-- Entry card -->
            <div class="fade-in bg-slate-900 border border-slate-800 rounded-2xl p-8 sm:p-10">
                <!-- Icon -->
                <div class="flex justify-center mb-6">
                    <div class="w-16 h-16 bg-blue-600/10 border border-blue-500/20 rounded-2xl flex items-center justify-center">
                        <i class="fas fa-cubes text-blue-400 text-2xl"></i>
                    </div>
                </div>

                <!-- Title -->
                <div class="text-center mb-8">
                    <h1 class="text-2xl sm:text-3xl font-bold text-white mb-3">Welcome to Dashboard</h1>
                    <p class="text-slate-400 text-sm sm:text-base leading-relaxed">
                        Explore your personalized DTB Technologies workspace with project showcases, tools, and resources.
                    </p>
                </div>

                <!-- Feature highlights -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-8">
                    <div class="feature-card flex items-center space-x-3 sm:flex-col sm:space-x-0 sm:text-center sm:space-y-2 p-3 rounded-xl bg-slate-800/40 border border-slate-700/30">
                        <i class="fas fa-bolt text-blue-400 text-sm"></i>
                        <span class="text-slate-300 text-xs font-medium">Instant Access</span>
                    </div>
                    <div class="feature-card flex items-center space-x-3 sm:flex-col sm:space-x-0 sm:text-center sm:space-y-2 p-3 rounded-xl bg-slate-800/40 border border-slate-700/30">
                        <i class="fas fa-lock-open text-blue-400 text-sm"></i>
                        <span class="text-slate-300 text-xs font-medium">No Login Required</span>
                    </div>
                    <div class="feature-card flex items-center space-x-3 sm:flex-col sm:space-x-0 sm:text-center sm:space-y-2 p-3 rounded-xl bg-slate-800/40 border border-slate-700/30">
                        <i class="fas fa-shield-alt text-blue-400 text-sm"></i>
                        <span class="text-slate-300 text-xs font-medium">Secure Session</span>
                    </div>
                </div>

                <!-- Enter button -->
                <button id="enter-btn" onclick="enterDashboard()" class="w-full py-3.5 px-6 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white rounded-xl font-semibold text-base transition-colors duration-200 flex items-center justify-center space-x-2 min-h-[48px]">
                    <span>Enter Dashboard</span>
                    <i class="fas fa-arrow-right text-sm"></i>
                </button>
            </div>

            <!-- Footer note -->
            <p class="text-center text-slate-600 text-xs mt-6">
                Free access for all visitors. Your session data stays in your browser.
            </p>
        </div>
    </main>

    <script>
        // Fade-in on load
        document.addEventListener('DOMContentLoaded', function() {
            requestAnimationFrame(() => {
                document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
            });
        });

        function enterDashboard() {
            const btn = document.getElementById('enter-btn');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin text-sm"></i><span class="ml-2">Loading...</span>';
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            sessionStorage.setItem('dashboardAccess', 'true');

            setTimeout(() => {
                window.location.href = './dashboard/welcome.html';
            }, 600);
        }
    </script>
</body>
</html>
