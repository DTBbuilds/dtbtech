    <script>
      // Mobile menu toggle
      document
        .getElementById('mobile-menu-button')
        .addEventListener('click', function () {
          document.getElementById('mobile-menu').classList.toggle('hidden');
        });

      // Chat functionality
      const chatForm = document.getElementById('chat-form');
      const chatInput = document.getElementById('chat-input');
      const chatContainer = document.getElementById('chat-container');

      chatForm.addEventListener('submit', function (e) {
        e.preventDefault();
        const message = chatInput.value.trim();
        if (message) {
          // Add user message
          addMessage('You', message, 'justify-end');
          chatInput.value = '';

          // Simulate bot response
          setTimeout(() => {
            addMessage(
              'TechBot',
              'Thank you for your message. Our team will get back to you shortly.',
              'justify-start'
            );
          }, 1000);
        }
      });

      function addMessage(sender, text, justify) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `flex ${justify}`;
        messageDiv.innerHTML = `
                <div class="${sender === 'You' ? 'bg-blue-500 text-white' : 'bg-blue-100 text-gray-800'} rounded-lg p-3 max-w-[80%]">
                    <p><strong class="${sender === 'You' ? 'text-white' : 'text-blue-600'}">${sender}:</strong> ${text}</p>
                </div>
            `;
        chatContainer.appendChild(messageDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }
    </script>

    <script>
      // Help Modal Functions
      const helpButton = document.getElementById('help-button');
      const helpModal = document.getElementById('help-modal');

      helpButton.addEventListener('click', () => {
        helpModal.classList.remove('hidden');
        // Add entrance animation classes
        const modalContent = helpModal.querySelector('div:nth-child(2)');
        modalContent.classList.add('animate-fade-in');
      });

      function closeHelpModal() {
        helpModal.classList.add('hidden');
      }

      // Close modal when clicking outside
      helpModal.addEventListener('click', e => {
        if (e.target === helpModal) {
          closeHelpModal();
        }
      });
    </script>
